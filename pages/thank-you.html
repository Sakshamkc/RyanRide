<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You</title>
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(to right, #f9f9f9, #e0f7fa);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .thank-you-container {
            background: #fff;
            border-radius: 15px;
            padding: 50px 30px;
            text-align: center;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 90%;
            animation: fadeIn 1s ease-in-out;
        }

        .thank-you-container h1 {
            color: #007bff;
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        .thank-you-container p {
            font-size: 1.1rem;
            color: #555;
            margin-bottom: 30px;
        }

        .thank-you-container .btn {
            font-size: 1rem;
            padding: 10px 25px;
            border-radius: 50px;
            transition: 0.3s;
        }

        .thank-you-container .btn:hover {
            background-color: #0056b3;
            color: #fff;
        }

        /* Simple fade-in animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="thank-you-container">
        <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" fill="#007bff" class="bi bi-check-circle mb-3"
            viewBox="0 0 16 16">
            <path
                d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zM6.97 10.97l-3.5-3.5 1.414-1.414L6.97 8.142l4.243-4.243 1.414 1.414-5.657 5.657z" />
        </svg>
        <h1>Thank You!</h1>
        <p>Your booking has been submitted successfully. We will confirm your ride shortly.</p>
        <a href="index.html" class="btn btn-primary">Back to Home</a>
    </div>

    <!-- Bootstrap JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
