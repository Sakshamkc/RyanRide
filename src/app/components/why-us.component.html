<section id="why-us" class="section-padding bg-medium-grey">
  <div class="container">
    <h2 class="text-center display-5 fw-bold mb-5">Why Choose HR Taxi?</h2>
    <div class="row g-4">
      @for (feature of features; track feature.title) {
        <div class="col-md-6 col-lg-4">
          <div class="card service-card text-center h-100">
            <div class="card-body">
              <i [class]="feature.icon + ' card-icon'"></i>
              <h5 class="card-title fw-bold">{{ feature.title }}</h5>
              <p class="card-text">{{ feature.text }}</p>
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</section>
