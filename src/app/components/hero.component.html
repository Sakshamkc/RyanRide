<section id="home" class="hero-carousel-container">
  <div class="carousel-item active">
    <div
      class="carousel-bg d-flex justify-content-center align-items-center"
      style="background-color: #f8f9fa; height: 100vh"
    >
      <div
        class="bg-white text-dark p-4 rounded shadow-lg w-60 mx-3"
        style="max-width: 1000px"
      >
        <h5 class="fw-bold mb-3 text-center areas-text">
          HR Taxi offers you comfy and reliable Taxi Services near you. We do
          all airport, Local and Long distance transfers in competitive fare.
          Our service areas:
        </h5>
        <div class="container">
          <div class="row justify-content-center text-center text-md-start">
            <div class="col-12">
              <ul class="list-unstyled area-list grid-8 mb-0 areas-text">
                @for (area of areasRow1; track area) {
                  <li>{{ area }}</li>
                }
              </ul>
            </div>
            <div class="col-12">
              <ul class="list-unstyled area-list grid-7 mb-0 areas-text">
                @for (area of areasRow2; track area) {
                  <li>{{ area }}</li>
                }
              </ul>
            </div>
          </div>
        </div>
        <div class="text-center mt-4">
          <a
            href="#book-now"
            class="btn btn-success btn-lg shadow-sm hero-btn me-2 mb-2 mb-md-0"
            (click)="scrollToBooking(); $event.preventDefault()"
          >
            <i class="fas fa-taxi me-2"></i>Book Now
          </a>
        </div>
      </div>
    </div>
  </div>
</section>
