<section
  id="book-now"
  class="booking-form-section container py-5 px-3 px-md-5 my-5 shadow-lg rounded-4"
>
  <div class="row justify-content-center">
    <div class="col-lg-10 col-xl-9">
      <h2 class="text-center mb-2">Book Your Ride</h2>
      <p class="text-center mb-1 text-muted">
        We prefer you to book by WhatsApp
      </p>
      <p class="text-center mb-3 text-muted">
        Fill out the form below to book your taxi. We'll confirm your ride
        shortly!
      </p>

      <form (ngSubmit)="onSubmit()">
        <!-- Service Type Selector (always visible) -->
        <div class="row g-4 mb-3">
          <div class="col-12 col-sm-6 col-md-6">
            <label for="serviceType" class="form-label">Select a Service</label>
            <select
              class="form-select"
              id="serviceType"
              [(ngModel)]="serviceType"
              [ngModelOptions]="{ standalone: true }"
              (change)="onServiceChange()"
            >
              <option selected disabled value="">Select service type</option>
              <option>Airport Transfer/Pickup</option>
              <option>Airport Transfer/Drop off</option>
              <option>Work Transfers</option>
              <option>Local Transfers</option>
              <option>Long Distance</option>
            </select>
          </div>
        </div>

        <!-- ═══════════════════════════════════════════ -->
        <!-- City / Work / Long Distance Form           -->
        <!-- ═══════════════════════════════════════════ -->
        @if (isCityType) {
          <div [formGroup]="cityForm">
            <div class="row g-4">
              <div class="col-6 col-md-4">
                <label for="fullName" class="form-label"
                  >Name <span class="text-danger">*</span></label
                >
                <input
                  type="text"
                  class="form-control"
                  id="fullName"
                  formControlName="fullName"
                  placeholder="Enter your name"
                />
              </div>
              <div class="col-6 col-md-4">
                <label for="phoneNumber" class="form-label"
                  >Phone Number <span class="text-danger">*</span></label
                >
                <input
                  type="tel"
                  class="form-control"
                  id="phoneNumber"
                  formControlName="phoneNumber"
                  placeholder="Enter your number"
                />
              </div>
              <div class="col-6 col-md-4">
                <label for="email" class="form-label">Email Address</label>
                <input
                  type="email"
                  class="form-control"
                  id="email"
                  formControlName="email"
                  placeholder="Enter your email"
                />
              </div>
              <div class="col-6 col-md-6">
                <label for="vehicleType" class="form-label"
                  >Select a Vehicle</label
                >
                <select
                  class="form-select"
                  id="vehicleType"
                  formControlName="vehicleType"
                >
                  <option selected disabled value="">Select Vehicle</option>
                  @for (v of vehicles; track v) {
                    <option>{{ v }}</option>
                  }
                </select>
              </div>
              <div class="col-6 col-md-6">
                <label for="pickupLocation" class="form-label"
                  >Pickup Address <span class="text-danger">*</span></label
                >
                <input
                  type="text"
                  class="form-control"
                  id="pickupLocation"
                  formControlName="pickupLocation"
                  placeholder="Pickup Address"
                />
              </div>
              <div class="col-6 col-md-6">
                <label for="destination" class="form-label"
                  >Destination Address <span class="text-danger">*</span></label
                >
                <input
                  type="text"
                  class="form-control"
                  id="destination"
                  formControlName="destination"
                  placeholder="Drop-off Address"
                />
              </div>
              <div class="col-6 col-md-6">
                <label for="passengerCount" class="form-label"
                  >No of Passengers</label
                >
                <input
                  type="number"
                  class="form-control"
                  id="passengerCount"
                  formControlName="passengerCount"
                  min="1"
                />
              </div>
              <div class="col-6 col-md-6">
                <label for="luggageCount" class="form-label"
                  >No. of Luggages</label
                >
                <input
                  type="number"
                  class="form-control"
                  id="luggageCount"
                  formControlName="luggageCount"
                  min="0"
                />
              </div>
              <div class="col-12 col-md-4 d-flex align-items-end">
                <div class="form-check">
                  <input
                    class="form-check-input"
                    type="checkbox"
                    id="needReturnJourney"
                    formControlName="needReturnJourney"
                  />
                  <label class="form-check-label" for="needReturnJourney"
                    >Need Return Journey</label
                  >
                </div>
              </div>
              <div class="col-12">
                <label for="specialInstructions" class="form-label"
                  >Additional Notes</label
                >
                <textarea
                  class="form-control"
                  id="specialInstructions"
                  rows="3"
                  formControlName="specialInstructions"
                  placeholder="Any special requirements or information"
                ></textarea>
              </div>
              <div class="col-12 mt-4">
                <button
                  type="submit"
                  class="btn btn-warning btn-lg px-5"
                  [disabled]="submitting"
                >
                  {{ submitting ? "Submitting..." : "Submit" }}
                </button>
              </div>
            </div>
          </div>
        }

        <!-- ═══════════════════════════════════════════ -->
        <!-- Airport Transfer/Pickup Form               -->
        <!-- ═══════════════════════════════════════════ -->
        @if (isAirportPickup) {
          <div [formGroup]="airportPickupForm">
            <div class="row g-4">
              <div class="col-12 col-md-6">
                <label for="airportName" class="form-label"
                  >Airport <span class="text-danger">*</span></label
                >
                <select
                  class="form-select"
                  id="airportName"
                  formControlName="airportName"
                >
                  <option disabled selected value="">Select Airport</option>
                  @for (a of airports; track a) {
                    <option>{{ a }}</option>
                  }
                </select>
              </div>
              <div class="col-12 col-md-6">
                <label for="airportTerminal" class="form-label">Terminal</label>
                <input
                  type="text"
                  class="form-control"
                  id="airportTerminal"
                  formControlName="airportTerminal"
                  placeholder="e.g. Terminal 5, North Terminal"
                />
              </div>
              <div class="col-6 col-md-6">
                <label for="flightNumber" class="form-label"
                  >Flight No. <span class="text-danger">*</span></label
                >
                <input
                  type="text"
                  class="form-control"
                  id="flightNumber"
                  formControlName="flightNumber"
                  placeholder="e.g.LH2486"
                />
              </div>
              <div class="col-6 col-md-6">
                <label for="arrivingFrom" class="form-label"
                  >Arriving From</label
                >
                <input
                  type="text"
                  class="form-control"
                  id="arrivingFrom"
                  formControlName="arrivingFrom"
                  placeholder="e.g. Munich"
                />
              </div>
              <div class="col-6 col-md-6">
                <label for="pickMeAfter" class="form-label"
                  >Pick Me After</label
                >
                <input
                  type="text"
                  class="form-control"
                  id="pickMeAfter"
                  formControlName="pickMeAfter"
                  placeholder="e.g. 40 min, 1 hour"
                />
              </div>
              <div class="col-6 col-md-6">
                <label for="dropoffAddress" class="form-label"
                  >Drop-Off Address <span class="text-danger">*</span></label
                >
                <input
                  type="text"
                  class="form-control"
                  id="dropoffAddress"
                  formControlName="dropoffAddress"
                  placeholder="14 Langley Dr, Camberley GU15 3TB, UK"
                />
              </div>
              <div class="col-6 col-md-6">
                <label for="doorNo" class="form-label">Door No.</label>
                <input
                  type="text"
                  class="form-control"
                  id="doorNo"
                  formControlName="doorNo"
                  placeholder="e.g. 14"
                />
              </div>
              <div class="col-6 col-md-6">
                <label for="pickupDate" class="form-label">Date</label>
                <input
                  type="text"
                  class="form-control"
                  id="pickupDate"
                  formControlName="pickupDate"
                  placeholder="Select date"
                />
              </div>
              <div class="col-6 col-md-6">
                <label for="pickupTime" class="form-label">Time</label>
                <input
                  type="text"
                  class="form-control"
                  id="pickupTime"
                  formControlName="pickupTime"
                  placeholder="Select time"
                />
              </div>

              <!-- Passenger Details -->
              <div class="col-12"><h5 class="mt-3">Passenger Details</h5></div>
              <div class="col-6 col-md-4">
                <label for="airportPassengerName" class="form-label"
                  >Passenger Name <span class="text-danger">*</span></label
                >
                <input
                  type="text"
                  class="form-control"
                  id="airportPassengerName"
                  formControlName="airportPassengerName"
                  placeholder="Enter your name"
                />
              </div>
              <div class="col-6 col-md-4">
                <label for="airportContact" class="form-label"
                  >Contact Number <span class="text-danger">*</span></label
                >
                <input
                  type="tel"
                  class="form-control"
                  id="airportContact"
                  formControlName="airportContact"
                  placeholder="Enter number"
                />
              </div>
              <div class="col-12 col-md-4">
                <label for="airportEmail" class="form-label"
                  >Email Address</label
                >
                <input
                  type="email"
                  class="form-control"
                  id="airportEmail"
                  formControlName="airportEmail"
                  placeholder="Enter your email"
                />
              </div>

              <!-- Vehicle Details -->
              <div class="col-12"><h5 class="mt-4">Vehicle Details</h5></div>
              <div class="col-6 col-md-4">
                <label for="airportVehicle" class="form-label">Vehicle</label>
                <select
                  id="airportVehicle"
                  class="form-select"
                  formControlName="airportVehicle"
                >
                  <option selected disabled value="">Select vehicle</option>
                  @for (v of vehicles; track v) {
                    <option>{{ v }}</option>
                  }
                </select>
              </div>
              <div class="col-6 col-md-4">
                <label for="airportPassengers" class="form-label"
                  >No of Passengers</label
                >
                <input
                  type="number"
                  class="form-control"
                  id="airportPassengers"
                  formControlName="airportPassengers"
                  min="1"
                />
              </div>
              <div class="col-6 col-md-4">
                <label for="airportSmallLuggage" class="form-label"
                  >Small Luggage</label
                >
                <input
                  type="number"
                  class="form-control"
                  id="airportSmallLuggage"
                  formControlName="airportSmallLuggage"
                  min="0"
                />
              </div>
              <div class="col-6 col-md-4">
                <label for="airportLargeLuggage" class="form-label"
                  >Large Luggage</label
                >
                <input
                  type="number"
                  class="form-control"
                  id="airportLargeLuggage"
                  formControlName="airportLargeLuggage"
                  min="0"
                />
              </div>

              <div class="col-12">
                <label for="specialInstructionsPickup" class="form-label"
                  >Additional Notes</label
                >
                <textarea
                  class="form-control"
                  id="specialInstructionsPickup"
                  rows="3"
                  formControlName="specialInstructions"
                  placeholder="Any special requirements or information"
                ></textarea>
              </div>

              <div class="col-12 mt-4">
                <button
                  type="submit"
                  class="btn btn-warning btn-lg px-5"
                  [disabled]="submitting"
                >
                  {{ submitting ? "Submitting..." : "Submit" }}
                </button>
              </div>
            </div>
          </div>
        }

        <!-- ═══════════════════════════════════════════ -->
        <!-- Airport Transfer/Drop off Form             -->
        <!-- ═══════════════════════════════════════════ -->
        @if (isAirportDropoff) {
          <div [formGroup]="airportDropoffForm">
            <div class="row g-3">
              <div class="col-12 col-md-6">
                <label for="dropoffAirport" class="form-label"
                  >Airport <span class="text-danger">*</span></label
                >
                <select
                  class="form-select"
                  id="dropoffAirport"
                  formControlName="dropoffAirport"
                >
                  <option disabled selected value="">Select Airport</option>
                  @for (a of airports; track a) {
                    <option [value]="a">{{ a }}</option>
                  }
                </select>
              </div>
              <div class="col-12 col-md-6">
                <label for="dropoffTerminal" class="form-label"
                  >Terminal <span class="text-danger">*</span></label
                >
                <input
                  type="text"
                  class="form-control"
                  id="dropoffTerminal"
                  formControlName="dropoffTerminal"
                  placeholder="e.g. Terminal 5, North Terminal"
                />
              </div>
              <div class="col-12 col-md-6">
                <label for="dropoffPickupAddress" class="form-label"
                  >Pickup Address <span class="text-danger">*</span></label
                >
                <input
                  type="text"
                  class="form-control"
                  id="dropoffPickupAddress"
                  formControlName="dropoffPickupAddress"
                  placeholder="Enter pickup address"
                />
              </div>
              <div class="col-6 col-md-6">
                <label for="dropoffPickupTime" class="form-label"
                  >Pickup Time <span class="text-danger">*</span></label
                >
                <input
                  type="text"
                  class="form-control"
                  id="dropoffPickupTime"
                  formControlName="dropoffPickupTime"
                  placeholder="Select pickup time"
                />
              </div>
              <div class="col-6 col-md-6">
                <label for="dropoffDoorNo" class="form-label">Door No.</label>
                <input
                  type="text"
                  class="form-control"
                  id="dropoffDoorNo"
                  formControlName="dropoffDoorNo"
                  placeholder="e.g. 14"
                />
              </div>

              <!-- Passenger Details -->
              <div class="col-12"><h5 class="mt-3">Passenger Details</h5></div>
              <div class="col-6 col-md-4">
                <label for="dropoffPassengerName" class="form-label"
                  >Passenger Name <span class="text-danger">*</span></label
                >
                <input
                  type="text"
                  class="form-control"
                  id="dropoffPassengerName"
                  formControlName="dropoffPassengerName"
                  placeholder="Enter your name"
                />
              </div>
              <div class="col-6 col-md-4">
                <label for="dropoffContact" class="form-label"
                  >Contact Number <span class="text-danger">*</span></label
                >
                <input
                  type="tel"
                  class="form-control"
                  id="dropoffContact"
                  formControlName="dropoffContact"
                  placeholder="Enter number"
                />
              </div>
              <div class="col-12 col-md-4">
                <label for="dropoffEmail" class="form-label"
                  >Email Address</label
                >
                <input
                  type="email"
                  class="form-control"
                  id="dropoffEmail"
                  formControlName="dropoffEmail"
                  placeholder="Enter your email"
                />
              </div>

              <!-- Vehicle Details -->
              <div class="col-12"><h5 class="mt-4">Vehicle Details</h5></div>
              <div class="col-6 col-md-4">
                <label for="dropoffVehicle" class="form-label">Vehicle</label>
                <select
                  id="dropoffVehicle"
                  class="form-select"
                  formControlName="dropoffVehicle"
                >
                  <option selected disabled value="">Select vehicle</option>
                  @for (v of vehicles; track v) {
                    <option>{{ v }}</option>
                  }
                </select>
              </div>
              <div class="col-6 col-md-4">
                <label for="dropoffPassengers" class="form-label"
                  >No of Passengers</label
                >
                <input
                  type="number"
                  class="form-control"
                  id="dropoffPassengers"
                  formControlName="dropoffPassengers"
                  min="1"
                />
              </div>
              <div class="col-6 col-md-4">
                <label for="dropoffSmallLuggage" class="form-label"
                  >Small Luggage</label
                >
                <input
                  type="number"
                  class="form-control"
                  id="dropoffSmallLuggage"
                  formControlName="dropoffSmallLuggage"
                  min="0"
                />
              </div>
              <div class="col-6 col-md-4">
                <label for="dropoffLargeLuggage" class="form-label"
                  >Large Luggage</label
                >
                <input
                  type="number"
                  class="form-control"
                  id="dropoffLargeLuggage"
                  formControlName="dropoffLargeLuggage"
                  min="0"
                />
              </div>

              <div class="col-12 mt-4">
                <button
                  type="submit"
                  class="btn btn-warning btn-lg px-5"
                  [disabled]="submitting"
                >
                  {{ submitting ? "Submitting..." : "Submit" }}
                </button>
              </div>
            </div>
          </div>
        }
      </form>
    </div>
  </div>
</section>
